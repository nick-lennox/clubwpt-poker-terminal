<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-header">
    <h1>WPT TERMINAL</h1>
    <span class="version">v1.0.0</span>
  </div>

  <div class="popup-section">
    <h2>Player Database</h2>
    <div id="player-count">Loading...</div>
    <div class="button-row">
      <button id="export-btn">Export Data</button>
      <button id="clear-btn" class="danger">Clear All</button>
    </div>
  </div>

  <div class="popup-section">
    <h2>Status</h2>
    <div id="status">Navigate to a ClubWPT Gold table to activate.</div>
  </div>

  <div class="popup-footer">
    <a href="https://clubwptgold.com" target="_blank">ClubWPT Gold</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
